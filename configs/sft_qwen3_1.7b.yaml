# SFT training config for Qwen3-1.7B-Base
model:
  name: Qwen/Qwen3-1.7B
  use_lora: false         # Full fine-tuning (1.7B fits on A100-80GB)
  dtype: bfloat16

data:
  train_file: data/processed/train.jsonl
  val_file: data/processed/val.jsonl
  max_seq_length: 2048
  prompt_field: prompt
  completion_field: completion

training:
  output_dir: checkpoints/sft-qwen3-1.7b
  num_epochs: 3
  per_device_batch_size: 8
  gradient_accumulation_steps: 16  # effective batch = 128
  learning_rate: 2.0e-5
  lr_scheduler: cosine
  min_lr: 1.0e-6
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  seed: 42

wandb:
  project: openproof-tactic
  name: sft-qwen3-1.7b
